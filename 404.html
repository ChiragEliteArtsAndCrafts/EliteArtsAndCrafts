<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found · Elite Arts &amp; Crafts</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://eliteartsandcrafts.com/" />
    <meta
      http-equiv="refresh"
      content="0; url=https://eliteartsandcrafts.com/"
    />
    <script>
      // Map common legacy paths from the old PHP site to anchors on the new home.
      (function () {
        var p = (location.pathname || "/").toLowerCase();
        var target = "/";
        if (
          /^\/(category|product|products|catalog|catalogue|wood|woodtype|wood-type|latest)\b/.test(
            p,
          )
        )
          target = "/#products";
        else if (/^\/(about|aboutus|about-us)\b/.test(p)) target = "/#about";
        else if (/^\/(contact|contactus|contact-us|enquiry|enquire)\b/.test(p))
          target = "/#contact";
        else if (/^\/(home|index\.php)\b/.test(p)) target = "/";
        location.replace(target);
      })();
    </script>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0a0a;
        color: #f4f1ea;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        text-align: center;
      }
      a {
        color: #caa75c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 style="font-weight: 400; margin: 0 0 12px">Redirecting…</h1>
      <p>
        If you are not redirected,
        <a href="https://eliteartsandcrafts.com/">go to the homepage</a>.
      </p>
    </main>
  </body>
</html>
